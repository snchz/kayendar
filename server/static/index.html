<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kayendar — A lightweight CalDAV/CardDAV server with a modern calendar and contacts web client for your homelab." />
  <title>Kayendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      <div class="login-card glass">
        <div class="login-header">
          <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
              <path d="M10 16h20M10 20h20M10 24h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <rect x="14" y="8" width="2" height="6" rx="1" fill="white"/>
              <rect x="24" y="8" width="2" height="6" rx="1" fill="white"/>
              <defs>
                <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6366f1"/>
                  <stop offset="1" stop-color="#8b5cf6"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="login-title">Kayendar</h1>
          <p class="login-subtitle">Your personal calendar & contacts</p>
        </div>
        <form id="login-form" class="login-form" novalidate>
          <div class="field">
            <label for="username-input">Username</label>
            <input id="username-input" type="text" autocomplete="username" placeholder="your-username" required />
          </div>
          <div class="field">
            <label for="password-input">Password</label>
            <input id="password-input" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Sign In</span>
            <span class="btn-spinner hidden"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="app-screen" class="screen hidden">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar glass">
        <div class="sidebar-header">
          <div class="logo-small">
            <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="url(#logo-grad2)"/>
              <path d="M10 16h20M10 20h20M10 24h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <rect x="14" y="8" width="2" height="6" rx="1" fill="white"/>
              <rect x="24" y="8" width="2" height="6" rx="1" fill="white"/>
              <defs>
                <linearGradient id="logo-grad2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6366f1"/>
                  <stop offset="1" stop-color="#8b5cf6"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="app-name">Kayendar</span>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" id="nav-calendar" data-view="calendar">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Calendar
          </button>
          <button class="nav-item" id="nav-contacts" data-view="contacts">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Contacts
          </button>
        </nav>

        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>Calendars</span>
            <button id="add-calendar-btn" class="icon-btn" title="Add calendar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div id="calendars-list" class="collection-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>Address Books</span>
            <button id="add-addressbook-btn" class="icon-btn" title="Add address book">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div id="addressbooks-list" class="collection-list"></div>
        </div>

        <div class="sidebar-footer">
          <span id="username-display" class="username-display"></span>
          <button id="logout-btn" class="icon-btn" title="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content" class="main-content">
        <!-- Calendar View -->
        <div id="view-calendar" class="view active">
          <div class="view-header">
            <div class="view-nav">
              <button id="cal-prev" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <h2 id="cal-title" class="view-title"></h2>
              <button id="cal-next" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="view-actions">
              <button id="cal-today-btn" class="btn btn-ghost">Today</button>
              <div class="view-toggle">
                <button id="view-month-btn" class="toggle-btn active" data-view="month">Month</button>
                <button id="view-week-btn" class="toggle-btn" data-view="week">Week</button>
              </div>
              <button id="add-event-btn" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Event
              </button>
            </div>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <!-- Contacts View -->
        <div id="view-contacts" class="view">
          <div class="view-header">
            <h2 class="view-title">Contacts</h2>
            <div class="view-actions">
              <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="contacts-search" placeholder="Search contacts..." />
              </div>
              <button id="add-contact-btn" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Contact
              </button>
            </div>
          </div>
          <div id="contacts-grid" class="contacts-grid"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal: Add/Edit Event -->
  <div id="event-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h3 id="event-modal-title">New Event</h3>
        <button class="icon-btn modal-close" data-modal="event-modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="event-form">
        <div class="field">
          <label for="event-title">Title</label>
          <input id="event-title" type="text" placeholder="Event title" required />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="event-start">Start</label>
            <input id="event-start" type="datetime-local" required />
          </div>
          <div class="field">
            <label for="event-end">End</label>
            <input id="event-end" type="datetime-local" required />
          </div>
        </div>
        <div class="field">
          <label for="event-calendar">Calendar</label>
          <select id="event-calendar"></select>
        </div>
        <div class="field">
          <label for="event-description">Description</label>
          <textarea id="event-description" rows="3" placeholder="Optional description..."></textarea>
        </div>
        <input type="hidden" id="event-uid" />
        <input type="hidden" id="event-filename" />
        <input type="hidden" id="event-collection" />
        <div class="modal-footer">
          <button type="button" id="event-delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="submit" class="btn btn-primary">Save Event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add/Edit Contact -->
  <div id="contact-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h3 id="contact-modal-title">New Contact</h3>
        <button class="icon-btn modal-close" data-modal="contact-modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="contact-form">
        <div class="field-row">
          <div class="field">
            <label for="contact-firstname">First name</label>
            <input id="contact-firstname" type="text" placeholder="First name" />
          </div>
          <div class="field">
            <label for="contact-lastname">Last name</label>
            <input id="contact-lastname" type="text" placeholder="Last name" required />
          </div>
        </div>
        <div class="field">
          <label for="contact-email">Email</label>
          <input id="contact-email" type="email" placeholder="email@example.com" />
        </div>
        <div class="field">
          <label for="contact-phone">Phone</label>
          <input id="contact-phone" type="tel" placeholder="+1 555 000 0000" />
        </div>
        <div class="field">
          <label for="contact-addressbook">Address Book</label>
          <select id="contact-addressbook"></select>
        </div>
        <input type="hidden" id="contact-uid" />
        <input type="hidden" id="contact-filename" />
        <input type="hidden" id="contact-collection" />
        <div class="modal-footer">
          <button type="button" id="contact-delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="submit" class="btn btn-primary">Save Contact</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add Collection -->
  <div id="collection-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h3 id="collection-modal-title">New Collection</h3>
        <button class="icon-btn modal-close" data-modal="collection-modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="collection-form">
        <div class="field">
          <label for="col-name">Name</label>
          <input id="col-name" type="text" placeholder="My Calendar" required />
        </div>
        <div class="field">
          <label for="col-color">Color</label>
          <div class="color-picker-row">
            <input id="col-color" type="color" value="#6366f1" />
            <div class="color-swatches">
              <button type="button" class="swatch" data-color="#6366f1" style="background:#6366f1"></button>
              <button type="button" class="swatch" data-color="#ec4899" style="background:#ec4899"></button>
              <button type="button" class="swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
              <button type="button" class="swatch" data-color="#10b981" style="background:#10b981"></button>
              <button type="button" class="swatch" data-color="#3b82f6" style="background:#3b82f6"></button>
              <button type="button" class="swatch" data-color="#ef4444" style="background:#ef4444"></button>
              <button type="button" class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
              <button type="button" class="swatch" data-color="#06b6d4" style="background:#06b6d4"></button>
            </div>
          </div>
        </div>
        <input type="hidden" id="col-type" value="calendar" />
        <input type="hidden" id="col-slug" />
        <div class="modal-footer">
          <button type="button" id="col-delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/assets/app.js"></script>
</body>
</html>
